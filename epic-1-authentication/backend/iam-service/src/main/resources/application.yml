server:
  port: 8081

spring:
  application:
    name: iam-service

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: iam-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # FIX #2 : package et classe corrigés (iam_service -> iam, UserRegisteredEvent -> UserCreatedEvent)
        spring.json.trusted.packages: "com.engagement.iam.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.engagement.iam.event.UserCreatedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  datasource:
    # FIX #3 : nom du service PostgreSQL doit correspondre exactement au service docker-compose
    url: jdbc:postgresql://postgres-iam:5432/iam_db
    username: iam_user
    password: iam_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        # FIX bonus : évite les problèmes de dialecte PostgreSQL avec les enums
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  instance:
    hostname: iam-service
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: false
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-service:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: YTFiMmMzZDRlNWY2ZzdoOGk5ajBrMWwybTNuNG81cDY3cThyOXMwdTF2MnczeDR5NXo2YTdiOGM5ZA==
    expiration: 1800000   # 30 minutes en millisecondes

appKafka:
  topics:
    userRegistered: com.engagement.iam.user.registered

appAi:
  baseUrl: ${APP_AI_BASE_URL:http://face-recognition-service:8082}

iam:
  auto-approve: ${IAM_AUTO_APPROVE:false}

