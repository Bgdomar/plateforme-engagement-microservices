<header class="header">
  <div class="container">
    <div class="header-content">

      <!-- Logo -->
      <a routerLink="/dashboard/admin" class="logo">
        <img src="favicon.ico" alt="StagiaireDXC" style="width:36px;height:36px;object-fit:contain;" />
        <h1 class="logo-text">Stagiaire<span class="logo-dot">DXC</span></h1>
        <span class="admin-badge">Admin</span>
      </a>

      <!-- Navigation -->
      <nav class="navigation">
        <a routerLink="/dashboard/admin"
           class="nav-link"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Dashboard
        </a>
        <a routerLink="/dashboard/admin/inscriptions" class="nav-link" routerLinkActive="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          Inscriptions
        </a>
        <!-- Dans la navigation, ajoutez ce lien -->
        <a routerLink="/dashboard/admin/users" routerLinkActive="active" class="nav-link">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          Utilisateurs
        </a>
        <a routerLink="/dashboard/admin/missions" class="nav-link" routerLinkActive="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          Missions
        </a>
      </nav>

      <!-- Actions -->
      <div class="actions">

        <!-- Notifications -->
        <div class="notif-wrapper">
          <button class="icon-button" (click)="toggleNotifications()" aria-label="Notifications">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span class="icon-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
          </button>

          <div class="notif-dropdown" [class.show]="isNotifOpen">
            <div class="notif-header">
              <span class="notif-title">Notifications</span>
              <button class="mark-all" (click)="markAllRead()">Tout lire</button>
            </div>
            <div class="notif-list">
              <div *ngFor="let notif of notifications" class="notif-item" [class.unread]="!notif.read">
                <div class="notif-dot" *ngIf="!notif.read"></div>
                <div class="notif-content">
                  <p class="notif-text"><strong>{{ notif.title }}</strong> {{ notif.message }}</p>
                  <span class="notif-time">{{ getTimeAgo(notif.createdAt) }}</span>
                </div>
              </div>
              <div *ngIf="notifications.length === 0" class="notif-empty">Aucune notification</div>
            </div>
          </div>
        </div>

        <div class="user-dropdown">
          <button class="user-trigger icon-button" (click)="toggleDropdown()" aria-label="Profil admin">
            <div class="admin-avatar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
              </svg>
            </div>
          </button>

          <div class="dropdown-content" [class.show]="isDropdownOpen">
            <div class="user-info-header">
              <div class="user-avatar-container">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="user-avatar-icon">
                  <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </div>
              <div class="user-details">
                <p class="user-name">{{ prenom }} {{ nom }}</p>
                <p class="user-email">{{ email }}</p>
                <span class="role-tag">Super Administrateur</span>
              </div>
            </div>

            <div class="dropdown-separator"></div>

            <a routerLink="/dashboard/admin" class="dropdown-item" (click)="closeDropdown()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
              Dashboard
            </a>

            <div class="dropdown-separator"></div>

            <button class="dropdown-item logout" (click)="logout()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Déconnexion
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
