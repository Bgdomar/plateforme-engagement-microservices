<app-header-encadrant></app-header-encadrant>
<div class="subject-detail-container">
  <div *ngIf="isLoading" class="loading-state">
    <div class="spinner"></div>
    <p>Chargement...</p>
  </div>

  <div *ngIf="!isLoading && subject" class="detail-wrapper">
    <div class="detail-header">
      <div class="header-left">
        <button routerLink="/encadrant/subjects" class="back-btn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Retour aux sujets
        </button>
      </div>
      <div class="header-right">
        <button class="btn-edit" (click)="editSubject()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
          </svg>
          Modifier
        </button>
        <button class="btn-delete" (click)="deleteSubject()">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
          </svg>
          Supprimer
        </button>
      </div>
    </div>

    <div class="subject-card">
      <div class="subject-header">
        <div class="subject-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
        </div>
        <div class="subject-info">
          <h1 class="subject-title">{{ subject.titre }}</h1>
          <span class="badge" [class]="getStatutClass(subject.statut)">
            {{ getStatutLabel(subject.statut) }}
          </span>
        </div>
      </div>

      <div class="subject-description">
        <h3 class="section-subtitle">Description</h3>
        <p>{{ subject.description }}</p>
      </div>

      <div class="subject-meta">
        <div class="meta-row">
          <span class="meta-label">Date de création :</span>
          <span class="meta-value">{{ getFormattedDate(subject.dateCreation) }}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Dernière modification :</span>
          <span class="meta-value">{{ getFormattedDate(subject.dateMiseAJour) }}</span>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading && errorMessage" class="error-state">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <p>{{ errorMessage }}</p>
    <button routerLink="/encadrant/subjects" class="btn-primary">Retour aux sujets</button>
  </div>
</div>
