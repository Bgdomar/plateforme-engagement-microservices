<header class="header">
  <div class="container">
    <div class="header-content">

      <!-- Logo -->
      <a routerLink="/dashboard/encadrant" class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <h1 class="logo-text">EngageTrack<span class="logo-dot">.</span></h1>
        <span class="role-badge-header">Encadrant</span>
      </a>

      <!-- Navigation -->
      <nav class="navigation">
        <a routerLink="/dashboard/encadrant"
           class="nav-link"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Dashboard</span>
        </a>
        <a routerLink="/encadrant/subjects" class="nav-link" routerLinkActive="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <span>Mes sujets</span>
        </a>

        <a routerLink="/encadrant/equipes" class="nav-link" routerLinkActive="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
          <span>Équipes</span>
        </a>

        <a routerLink="/encadrant/evaluation" class="nav-link" routerLinkActive="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          <span>Livrables</span>
        </a>
        <a routerLink="/dashboard/encadrant/chat" class="nav-link" routerLinkActive="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
          <span>Chat</span>
        </a>
      </nav>

      <!-- Actions -->
      <div class="actions">

        <!-- Points -->
        <div class="points-chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <span>{{ points }} pts</span>
        </div>

        <!-- Notifications -->
        <div class="notif-wrapper">
          <button class="icon-button" (click)="toggleNotifications()" aria-label="Notifications">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span class="icon-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
          </button>

          <div class="notif-dropdown" [class.show]="isNotifOpen">
            <div class="notif-header">
              <span class="notif-title">Notifications</span>
              <button class="mark-all" (click)="markAllRead()">Tout lire</button>
            </div>
            <div class="notif-list">
              <div *ngFor="let notif of notifications" class="notif-item" [class.unread]="!notif.read">
                <div class="notif-dot" *ngIf="!notif.read"></div>
                <div class="notif-content">
                  <p class="notif-text">{{ notif.message }}</p>
                  <span class="notif-time">{{ notif.time }}</span>
                </div>
              </div>
              <div *ngIf="notifications.length === 0" class="notif-empty">Aucune notification</div>
            </div>
          </div>
        </div>

        <!-- User dropdown -->
        <div class="user-dropdown">
          <button class="user-trigger" aria-label="Profil" (click)="toggleDropdown()">
            <div class="profile-image-container">
              <img *ngIf="showProfileImage && userProfileImage"
                   [src]="userProfileImage" alt="Photo de profil"
                   class="profile-image" (error)="onImageError()">
              <svg *ngIf="!showProfileImage || !userProfileImage"
                   class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
          </button>

          <div class="dropdown-content" [class.show]="isDropdownOpen">
            <div class="user-info-with-image">
              <div class="user-avatar-container">
                <img *ngIf="showProfileImage && userProfileImage"
                     [src]="userProfileImage" alt="" class="user-avatar" (error)="onImageError()">
                <svg *ngIf="!showProfileImage || !userProfileImage"
                     class="user-avatar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <div class="user-details">
                <p class="user-name">{{ prenom }} {{ nom }}</p>
                <p class="user-email">{{ email }}</p>
                <span class="role-tag">Encadrant</span>
              </div>
            </div>

            <div class="level-bar">
              <div class="level-info">
                <span class="level-label">Niveau {{ niveau }}</span>
                <span class="level-xp">{{ points }} / {{ nextLevelPoints }} pts</span>
              </div>
              <div class="level-progress">
                <div class="level-fill" [style.width.%]="levelProgress"></div>
              </div>
            </div>

            <div class="dropdown-separator"></div>

            <a routerLink="/encadrant/profil" class="dropdown-item" (click)="closeDropdown()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              Mon profil
            </a>
            <a routerLink="/encadrant/teams" class="dropdown-item" (click)="closeDropdown()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
              </svg>
              Mes équipes
            </a>

            <div class="dropdown-separator"></div>

            <button class="dropdown-item logout" (click)="logout()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Déconnexion
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>
</header>
