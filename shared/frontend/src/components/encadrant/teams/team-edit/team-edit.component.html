<app-header-encadrant></app-header-encadrant>
<div class="team-edit-container">
  <div class="form-wrapper">
    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Chargement...</p>
    </div>

    <div *ngIf="!isLoading && team">
      <div class="form-header">
        <button routerLink="/encadrant/teams/{{ teamId }}" class="back-btn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Retour
        </button>
        <h1 class="form-title">Modifier l'équipe</h1>
        <p class="form-subtitle">{{ team.nom }}</p>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="onSubmit()" class="team-form">
        <div class="form-group">
          <label class="form-label">
            Nom de l'équipe <span class="required">*</span>
          </label>
          <input type="text"
                 [(ngModel)]="teamRequest.nom"
                 name="nom"
                 class="form-input"
                 required>
        </div>

        <div class="form-group">
          <label class="form-label">Sujet / Description</label>
          <textarea [(ngModel)]="teamRequest.sujet"
                    name="sujet"
                    rows="4"
                    class="form-textarea"
                    placeholder="Décrivez le sujet ou la mission de l'équipe..."></textarea>
        </div>

        <div class="form-info">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <p>Pour ajouter ou retirer des membres, veuillez utiliser la page des détails de l'équipe.</p>
        </div>

        <div class="form-actions">
          <button type="button" routerLink="/encadrant/teams/{{ teamId }}" class="btn-cancel">
            Annuler
          </button>
          <button type="submit" class="btn-submit" [disabled]="isSubmitting">
            <span *ngIf="!isSubmitting">Enregistrer</span>
            <span *ngIf="isSubmitting" class="loading-spinner"></span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
