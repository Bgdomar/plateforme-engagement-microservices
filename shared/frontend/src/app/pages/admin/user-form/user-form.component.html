<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <div class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <button (click)="goBack()" class="inline-flex items-center text-sm text-gray-500 hover:text-gray-700 mb-3 transition-colors">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to Users
      </button>
      <h1 class="text-2xl font-bold text-gray-900">{{isEdit ? 'Edit User' : 'Create User'}}</h1>
      <p class="mt-1 text-sm text-gray-500">{{isEdit ? 'Update user information' : 'Add a new user to the platform'}}</p>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loadingUser" class="flex justify-center py-16">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-primary-500"></div>
  </div>

  <!-- Form -->
  <div *ngIf="!loadingUser" class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <form (ngSubmit)="onSubmit()" #userForm="ngForm">
      <!-- Account Information -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Account Information</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
            <input type="email" [(ngModel)]="form.email" name="email" required email
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none"
              placeholder="user@example.com" />
          </div>
          <div [class]="isEdit ? 'sm:col-span-2' : ''">
            <label class="block text-sm font-medium text-gray-700 mb-1">Password {{isEdit ? '(leave blank to keep)' : '*'}}</label>
            <input type="password" [(ngModel)]="form.password" name="password" [required]="!isEdit" minlength="6"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none"
              placeholder="{{isEdit ? '••••••••' : 'Min 6 characters'}}" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Role *</label>
            <select [(ngModel)]="form.role" name="role" required
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none bg-white">
              <option value="">Select role</option>
              <option *ngFor="let r of roles" [value]="r">{{r}}</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
            <select [(ngModel)]="form.status" name="status"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none bg-white">
              <option *ngFor="let s of statuses" [value]="s">{{s}}</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Personal Information -->
      <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Personal Information</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input type="text" [(ngModel)]="form.firstName" name="firstName"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none"
              placeholder="John" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input type="text" [(ngModel)]="form.lastName" name="lastName"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none"
              placeholder="Doe" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
            <input type="tel" [(ngModel)]="form.phone" name="phone"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none"
              placeholder="+33 6 12 34 56 78" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Position</label>
            <input type="text" [(ngModel)]="form.position" name="position"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none"
              placeholder="Software Engineer" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
            <input type="text" [(ngModel)]="form.department" name="department"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none"
              placeholder="Engineering" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
            <input type="text" [(ngModel)]="form.address" name="address"
              class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-200 focus:border-primary-500 outline-none"
              placeholder="123 Street, City" />
          </div>
        </div>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-6">
        {{errorMessage}}
      </div>

      <!-- Actions -->
      <div class="flex justify-end space-x-3">
        <button type="button" (click)="goBack()"
          class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
          Cancel
        </button>
        <button type="submit" [disabled]="saving || !userForm.valid"
          class="px-5 py-2.5 text-sm font-medium text-white bg-primary-500 rounded-lg hover:bg-primary-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed inline-flex items-center">
          <div *ngIf="saving" class="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></div>
          {{saving ? 'Saving...' : (isEdit ? 'Update User' : 'Create User')}}
        </button>
      </div>
    </form>
  </div>

  <!-- Toast -->
  <div *ngIf="toast" class="fixed bottom-6 right-6 z-50">
    <div class="flex items-center px-4 py-3 rounded-xl shadow-lg text-sm font-medium"
      [ngClass]="toast.type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'">
      {{toast.message}}
    </div>
  </div>
</div>
