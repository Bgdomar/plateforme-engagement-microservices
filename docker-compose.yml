services:

  # ===== KAFKA (KRaft) =====
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    restart: always
    ports:
      - "29092:29092"
    environment:
      CLUSTER_ID: r4zt_wrqT6e0YJ2k2eQ6cA
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ===== DATABASES =====
  postgres-mission:
    image: postgres:16
    container_name: postgres-mission
    restart: always
    environment:
      POSTGRES_DB: mission_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_mission_data:/var/lib/postgresql/data



  # ===== DISCOVERY SERVICE =====
  discovery-service:
    build:
      context: ./infrastructure/discovery-service
      dockerfile: Dockerfile
    container_name: discovery-service
    restart: always
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: discovery-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s


  # ===== IDENTITY SERVICE (IAM + User Profile fusionné) =====
  identity-service:
    build:
      context: ./epic-1-authentication/backend/identity-service
      dockerfile: Dockerfile
    container_name: com.engagement.identity-service
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - identity_uploads:/app/assets/images  # Volume persistant pour les images
    environment:
      SPRING_APPLICATION_NAME: identity-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-identity:5432/identity_db
      SPRING_DATASOURCE_USERNAME: identity_user
      SPRING_DATASOURCE_PASSWORD: identity_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: YTFiMmMzZDRlNWY2ZzdoOGk5ajBrMWwybTNuNG81cDY3cThyOXMwdTF2MnczeDR5NXo2YTdiOGM5ZA==
      JWT_EXPIRATION: 86400000
      APP_UPLOAD_PATH: /app/assets/images
      APP_UPLOAD_URL_PREFIX: /uploads/
    depends_on:
      postgres-identity:
        condition: service_started

  # ===== IDENTITY DATABASE =====
  postgres-identity:
    image: postgres:16
    container_name: postgres-identity
    restart: always
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    ports:
      - "5437:5432"
    volumes:
      - pg_identity_data:/var/lib/postgresql/data


  # ===== MISSION SERVICE ===
  mission-service:
    build:
      context: ./epic-3-missions/backend/mission-service
      dockerfile: Dockerfile
    container_name: mission-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_APPLICATION_NAME: mission-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-mission:5432/mission_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      postgres-mission:
        condition: service_started
      discovery-service:
        condition: service_healthy





  # ===== API GATEWAY ===
  api-gateway:
    build:
      context: ./infrastructure/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka
    depends_on:
      discovery-service:
        condition: service_healthy
      identity-service:
        condition: service_started
      mission-service:
        condition: service_started



  # ===== FRONTEND =====
  frontend:
    build:
      context: ./shared/frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://localhost:8080
        FACIAL_AI_URL: http://localhost:8082
    container_name: frontend
    restart: always
    ports:
      - "4200:4200"
    depends_on:
      - api-gateway


volumes:
  pg_iam_data:
  pg_user_profile_data:
  pg_identity_data:
  pg_mission_data:
  kafka_data:
  user_profile_images:
  identity_uploads:



networks:
  default:
    name: plateforme-engagement-network
    external: true

