server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      codecs:
        max-in-memory-size: 5MB

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:4200"
              - "http://127.0.0.1:4200"
            allowed-methods:
              - "*"
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      routes:
        # Identity Service
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/auth/**,/admin/**,/users/**,/inscriptions/**,/api/admin/**,/api/admin/inscriptions/**,/api/profil/**,/uploads/**

        - id: team-mission-service
          uri: lb://team-mission-service
          predicates:
            - Path=/api/equipes/**,/api/stagiaires-equipes/**,/api/missions/**

        - id: facial-ai-service
          uri: http://host.docker.internal:8000   # ← Pour accéder à localhost depuis Docker
          predicates:
              - Path=/facial-ai/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true